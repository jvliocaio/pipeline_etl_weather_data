services:
  weather_postgres:
    image: postgres:16-alpine
    container_name: weather_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: weather_admin
      POSTGRES_PASSWORD: weather_pass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_admin -d weather_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_weather_net

volumes:
  pgdata:
    driver: local

networks:
  shared_weather_net:
    external: true